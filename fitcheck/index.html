<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>FitCheck — AI Virtual Try-On</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet" />
<style>
  :root {
    --offwhite: #f3efe7;
    --offwhite-deep: #e9e3d8;
    --ink: #14110d;
    --accent: #ff2d55;
    --shadow: 0 1px 4px rgba(0, 0, 0, 0.55);
  }

  * { box-sizing: border-box; }

  html, body {
    margin: 0;
    padding: 0;
    height: 100%;
    font-family: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    background: var(--offwhite);
    -webkit-font-smoothing: antialiased;
  }

  /* Center a full-height phone-shaped column; off-white shows on desktop sides. */
  .frame {
    min-height: 100dvh;
    display: flex;
    align-items: center;
    justify-content: center;
    background:
      radial-gradient(120% 80% at 50% 0%, #f7f3ec 0%, var(--offwhite) 55%, var(--offwhite-deep) 100%);
  }

  /* The screen: a full-bleed media surface like an Instagram reel. */
  .screen {
    position: relative;
    width: 100%;
    max-width: 480px;
    height: 100dvh;
    overflow: hidden;
    background: var(--offwhite);
    display: flex;
    flex-direction: column;
    box-shadow: 0 24px 80px rgba(0,0,0,0.18);
  }

  /* The model image FILLS the entire screen (cover, full-bleed). */
  .model {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
    object-position: center top;
    z-index: 0;
    transition: opacity 0.35s ease, filter 0.35s ease;
  }

  /* Dark scrims top + bottom so overlaid white UI stays legible over bright media. */
  .scrim {
    position: absolute;
    inset: 0;
    z-index: 1;
    pointer-events: none;
    background:
      linear-gradient(to bottom, rgba(0,0,0,0.45) 0%, rgba(0,0,0,0) 22%),
      linear-gradient(to top, rgba(0,0,0,0.78) 0%, rgba(0,0,0,0) 42%);
  }

  /* ---- demo badge ---- */
  .demo-badge {
    position: absolute;
    top: 14px;
    right: 14px;
    z-index: 6;
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 6px 11px;
    border-radius: 999px;
    background: rgba(20,17,13,0.55);
    backdrop-filter: blur(12px);
    border: 1px solid rgba(255,255,255,0.2);
    color: #fff;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.2px;
    text-shadow: var(--shadow);
    pointer-events: none;
  }
  .demo-badge .dot {
    width: 6px; height: 6px; border-radius: 50%;
    background: var(--accent);
    box-shadow: 0 0 0 3px rgba(255,45,85,0.25);
  }

  /* ---- overlaid chrome ---- */
  .topbar {
    position: relative;
    z-index: 3;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 18px 18px 0;
  }
  .brand {
    color: #fff;
    font-size: 22px;
    font-weight: 900;
    letter-spacing: 0.3px;
    text-shadow: var(--shadow);
  }

  /* Right-side action rail (Instagram-style large icon buttons). */
  .rail {
    position: absolute;
    right: 12px;
    bottom: 248px;
    z-index: 3;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 18px;
  }
  .railbtn {
    appearance: none;
    background: none;
    border: none;
    cursor: pointer;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 3px;
    padding: 0;
    transition: transform 0.12s ease;
  }
  .railbtn:active { transform: scale(0.9); }
  .railbtn:disabled { opacity: 0.35; cursor: default; }
  .railicon { line-height: 0; filter: drop-shadow(0 1px 3px rgba(0,0,0,0.6)); }
  .icon { width: 28px; height: 28px; display: block; }
  .raillabel { color: #fff; font-size: 11px; font-weight: 700; text-shadow: var(--shadow); }

  /* Bottom overlay block: fit note, thumbs, input, button, tab bar. */
  .bottom {
    position: absolute;
    left: 0;
    right: 0;
    bottom: 0;
    z-index: 3;
    display: flex;
    flex-direction: column;
    gap: 12px;
    padding: 0 16px 10px;
  }

  /* Product name + fit note — kept compact so it never covers the design. */
  .pname {
    color: #fff;
    font-size: 18px;
    font-weight: 800;
    line-height: 1.25;
    text-shadow: var(--shadow);
  }
  .fitnote {
    display: flex;
    align-items: center;
    gap: 8px;
    color: rgba(255,255,255,0.92);
    font-size: 12.5px;
    font-weight: 600;
    text-shadow: var(--shadow);
    margin-top: -4px;
  }
  .sizepill {
    flex: 0 0 auto;
    font-size: 11px;
    font-weight: 800;
    color: var(--ink);
    background: rgba(255,255,255,0.92);
    padding: 2px 8px;
    border-radius: 7px;
    letter-spacing: 0.3px;
  }

  .thumbs {
    display: flex;
    gap: 8px;
    overflow-x: auto;
    padding-bottom: 2px;
    scrollbar-width: none;
  }
  .thumbs::-webkit-scrollbar { display: none; }
  .thumb {
    width: 54px;
    height: 72px;
    border-radius: 12px;
    object-fit: cover;
    object-position: center top;
    border: 2px solid rgba(255,255,255,0.5);
    cursor: pointer;
    flex: 0 0 auto;
    box-shadow: var(--shadow);
    transition: transform 0.12s ease, border-color 0.15s ease, box-shadow 0.15s ease;
  }
  .thumb:active { transform: scale(0.94); }
  .thumb.active { border-color: #fff; box-shadow: 0 0 0 2px var(--accent); }

  .composer { display: flex; gap: 8px; align-items: center; }
  .urlinput {
    flex: 1;
    min-width: 0;
    padding: 14px 16px;
    border-radius: 999px;
    border: 1px solid rgba(255,255,255,0.25);
    font-size: 15px;
    font-family: inherit;
    background: rgba(20,17,13,0.55);
    backdrop-filter: blur(12px);
    color: #fff;
    outline: none;
  }
  .urlinput::placeholder { color: rgba(255,255,255,0.7); }

  .tryon {
    appearance: none;
    border: none;
    background: var(--accent);
    color: #fff;
    font-size: 15px;
    font-weight: 800;
    font-family: inherit;
    padding: 14px 20px;
    border-radius: 999px;
    cursor: pointer;
    flex: 0 0 auto;
    box-shadow: 0 4px 14px rgba(255,45,85,0.4);
    transition: transform 0.12s ease, opacity 0.15s ease;
  }
  .tryon:active { transform: scale(0.96); }
  .tryon:disabled { opacity: 0.5; cursor: default; box-shadow: none; }

  .hint {
    color: #fff;
    font-size: 12px;
    background: rgba(255,45,85,0.85);
    padding: 8px 12px;
    border-radius: 10px;
    text-align: center;
  }

  /* Bottom tab bar — Instagram-style. "Trending" is the reserved future slot. */
  .tabbar {
    display: flex;
    margin: 4px -16px -10px;
    padding: 10px 0 calc(10px + env(safe-area-inset-bottom));
    background: rgba(10,10,10,0.55);
    backdrop-filter: blur(12px);
    border-top: 1px solid rgba(255,255,255,0.14);
  }
  .tab {
    flex: 1;
    appearance: none;
    background: none;
    border: none;
    font-family: inherit;
    color: rgba(255,255,255,0.5);
    font-size: 14px;
    font-weight: 800;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
  }
  .tab.on { color: #fff; }
  .tab:disabled { cursor: default; }
  .tab .soon {
    font-size: 9px;
    font-weight: 800;
    color: var(--ink);
    background: rgba(255,255,255,0.6);
    padding: 1px 5px;
    border-radius: 6px;
    letter-spacing: 0.3px;
  }

  /* Toast for the canned "Try on" action */
  .toast {
    position: absolute;
    left: 50%;
    bottom: 320px;
    transform: translateX(-50%) translateY(8px);
    z-index: 5;
    background: rgba(20,17,13,0.82);
    backdrop-filter: blur(12px);
    color: #fff;
    font-size: 12.5px;
    font-weight: 600;
    padding: 10px 16px;
    border-radius: 999px;
    box-shadow: 0 8px 24px rgba(0,0,0,0.3);
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.25s ease, transform 0.25s ease;
    white-space: nowrap;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  /* "Fitting…" loading shimmer overlay */
  .fitting {
    position: absolute;
    inset: 0;
    z-index: 2;
    display: flex;
    align-items: center;
    justify-content: center;
    background: rgba(20,17,13,0.28);
    backdrop-filter: blur(2px);
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.2s ease;
  }
  .fitting.show { opacity: 1; }
  .spinner {
    width: 38px; height: 38px;
    border-radius: 50%;
    border: 3px solid rgba(255,255,255,0.35);
    border-top-color: #fff;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  @media (max-width: 380px) {
    .rail { bottom: 256px; }
  }
</style>
</head>
<body>
  <main class="frame">
    <div class="screen">
      <div class="demo-badge"><span class="dot"></span>Demo · sample data</div>

      <!-- full-bleed media -->
      <img id="media" src="model-front.jpg" alt="model" class="model" />
      <div class="scrim"></div>

      <div class="fitting" id="fitting"><div class="spinner"></div></div>

      <!-- top brand -->
      <div class="topbar"><span class="brand">FitCheck</span></div>

      <!-- right action rail -->
      <div class="rail">
        <button class="railbtn" id="flipBtn" title="Rotate front/back">
          <span class="railicon">
            <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <path d="M3 12a9 9 0 0 1 15-6.7L21 8" />
              <path d="M21 3v5h-5" />
              <path d="M21 12a9 9 0 0 1-15 6.7L3 16" />
              <path d="M3 21v-5h5" />
            </svg>
          </span>
          <span class="raillabel" id="flipLabel">Back</span>
        </button>
        <button class="railbtn" id="modelBtn" title="Base model">
          <span class="railicon">
            <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <circle cx="12" cy="8" r="4" />
              <path d="M4 21c0-4 4-6 8-6s8 2 8 6" />
            </svg>
          </span>
          <span class="raillabel">Model</span>
        </button>
        <button class="railbtn" id="editBtn" title="Edit measurements">
          <span class="railicon">
            <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <path d="M12 20h9" />
              <path d="M16.5 3.5a2.12 2.12 0 0 1 3 3L7 19l-4 1 1-4Z" />
            </svg>
          </span>
          <span class="raillabel">Edit</span>
        </button>
      </div>

      <!-- bottom overlay -->
      <div class="bottom">
        <div class="pname" id="pname"></div>
        <div class="fitnote" id="fitnote" style="display:none;"></div>

        <div class="thumbs" id="thumbs"></div>

        <div class="hint" id="hint" style="display:none;"></div>

        <div class="composer">
          <input class="urlinput" id="url" type="url" inputmode="url" placeholder="Paste a product link…" />
          <button class="tryon" id="tryonBtn">Try on</button>
        </div>

        <div class="tabbar">
          <button class="tab on">Closet</button>
          <button class="tab" disabled>Trending <span class="soon">SOON</span></button>
        </div>
      </div>

      <div class="toast" id="toast"></div>
    </div>
  </main>

  <script>
    // ---- Canned sample data (no backend) ----
    // The base model + the Basquiat tee are REAL renders from the app.
    // The two extra looks reuse the model render with a subtle tonal filter
    // so the closet rail feels populated — all sample data.
    const MODEL = {
      id: "model",
      title: null,
      front: "model-front.jpg",
      back: "model-back.png",
      filter: "none",
      size: null,
      fit: null,
    };

    const LOOKS = [
      {
        id: "basquiat",
        title: "PEACE FOR ALL Graphic T-Shirt · Basquiat",
        front: "look-basquiat-front.png",
        back: "look-basquiat-back.png",
        filter: "none",
        size: "L",
        fit: "Regular fit — skims the body with a relaxed silhouette, sits just above the hip.",
      },
      {
        id: "oxford",
        title: "Uniqlo Oxford Slim-Fit Shirt · White",
        front: "model-front.jpg",
        back: "model-back.png",
        filter: "saturate(0.85) brightness(1.05) contrast(0.97)",
        size: "M",
        fit: "Slim fit — tapers through the waist; size up for a roomier layering shirt.",
      },
      {
        id: "heattech",
        title: "HEATTECH Mock Neck Long-Sleeve · Charcoal",
        front: "model-front.jpg",
        back: "model-back.png",
        filter: "saturate(0.6) brightness(0.78) contrast(1.06) sepia(0.06)",
        size: "S",
        fit: "Snug base layer — stretches to follow the body; true to size.",
      },
    ];

    // ---- State ----
    const media = document.getElementById("media");
    const fitting = document.getElementById("fitting");
    const pname = document.getElementById("pname");
    const fitnote = document.getElementById("fitnote");
    const thumbsEl = document.getElementById("thumbs");
    const flipBtn = document.getElementById("flipBtn");
    const flipLabel = document.getElementById("flipLabel");
    const modelBtn = document.getElementById("modelBtn");
    const editBtn = document.getElementById("editBtn");
    const tryonBtn = document.getElementById("tryonBtn");
    const urlInput = document.getElementById("url");
    const hint = document.getElementById("hint");
    const toast = document.getElementById("toast");

    let active = null;     // null => base model
    let face = "front";    // "front" | "back"

    function current() { return active || MODEL; }

    function render() {
      const c = current();
      const src = face === "back" ? c.back : c.front;
      media.style.filter = c.filter || "none";
      // brief crossfade
      media.style.opacity = "0.45";
      const img = new Image();
      img.onload = () => { media.src = src; media.style.opacity = "1"; };
      img.src = src;
      if (img.complete) { media.src = src; media.style.opacity = "1"; }

      flipLabel.textContent = face === "front" ? "Back" : "Front";

      // product name + fit note (only for a look)
      if (active) {
        pname.textContent = active.title;
        pname.style.display = "block";
        if (active.fit) {
          fitnote.innerHTML = '<span class="sizepill">Size ' + active.size + '</span>' + active.fit;
          fitnote.style.display = "flex";
        } else {
          fitnote.style.display = "none";
        }
      } else {
        pname.style.display = "none";
        fitnote.style.display = "none";
      }

      // thumbs active state
      [...thumbsEl.children].forEach((t) => {
        const id = t.dataset.id;
        const on = (active === null && id === "model") || (active && active.id === id);
        t.classList.toggle("active", on);
      });
    }

    function buildThumbs() {
      const items = [MODEL, ...LOOKS];
      items.forEach((it) => {
        const t = document.createElement("img");
        t.className = "thumb";
        t.src = it.front;
        t.style.filter = it.filter || "none";
        t.alt = it.title || "Base model";
        t.dataset.id = it.id;
        t.addEventListener("click", () => showLook(it.id === "model" ? null : it));
        thumbsEl.appendChild(t);
      });
    }

    function showLook(look) {
      active = look;
      face = "front";
      hint.style.display = "none";
      render();
    }

    flipBtn.addEventListener("click", () => {
      face = face === "front" ? "back" : "front";
      render();
    });
    modelBtn.addEventListener("click", () => showLook(null));

    editBtn.addEventListener("click", () => {
      showToast("Measurements are read-only in this demo");
    });

    let toastTimer = null;
    function showToast(msg) {
      toast.textContent = msg;
      toast.classList.add("show");
      clearTimeout(toastTimer);
      toastTimer = setTimeout(() => toast.classList.remove("show"), 2200);
    }

    // Canned "Try on": shows the fitting spinner, then lands on a look.
    let busy = false;
    function tryOn() {
      const val = urlInput.value.trim();
      if (busy) return;
      // pick a look to "generate": if the URL mentions uniqlo/oxford/heattech, match it;
      // otherwise rotate to the next look not currently shown.
      let target = LOOKS[0];
      const lc = val.toLowerCase();
      if (lc.includes("oxford") || lc.includes("shirt")) target = LOOKS[1];
      else if (lc.includes("heattech") || lc.includes("mock")) target = LOOKS[2];
      else if (lc.includes("basquiat") || lc.includes("peace")) target = LOOKS[0];
      else {
        const order = LOOKS.filter((l) => !active || l.id !== active.id);
        target = order[Math.floor(Math.random() * order.length)] || LOOKS[0];
      }

      busy = true;
      tryonBtn.textContent = "Fitting…";
      tryonBtn.disabled = true;
      fitting.classList.add("show");
      showToast("Fitting " + target.title.split("·")[0].trim() + " to your model…");

      setTimeout(() => {
        fitting.classList.remove("show");
        tryonBtn.textContent = "Try on";
        tryonBtn.disabled = false;
        busy = false;
        urlInput.value = "";
        showLook(target);
      }, 1500);
    }

    tryonBtn.addEventListener("click", tryOn);
    urlInput.addEventListener("keydown", (e) => { if (e.key === "Enter") tryOn(); });

    // ---- init ----
    buildThumbs();
    render();
  </script>
</body>
</html>
