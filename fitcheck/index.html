<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>FitCheck — AI Virtual Try-On</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<style>
  :root{
    --ink:#111; --bg:#fff; --muted:#767676; --faint:#a6a6a6;
    --line:#e6e6e6; --line-strong:#111; --hover:#fafafa; --matte:#efece4;
  }
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--ink);
    font:16px/1.55 "Helvetica Neue",system-ui,-apple-system,Arial,sans-serif;
    -webkit-font-smoothing:antialiased}
  .wrap{max-width:1000px;margin:0 auto;padding:30px 28px 60px}

  /* header */
  header{display:flex;align-items:flex-end;justify-content:space-between;gap:16px;
    border-bottom:2px solid var(--ink);padding-bottom:16px;flex-wrap:wrap}
  .brand{font-size:30px;font-weight:300;letter-spacing:-.02em;line-height:1}
  .brand .sub{display:block;font-size:11px;text-transform:uppercase;letter-spacing:.14em;
    color:var(--muted);margin-top:8px;font-weight:400}
  .badge{display:inline-flex;align-items:center;gap:7px;padding:5px 11px;border-radius:999px;
    border:1px solid var(--ink);font-size:10px;text-transform:uppercase;letter-spacing:.12em;white-space:nowrap}
  .badge .dot{width:5px;height:5px;border-radius:50%;background:var(--ink)}

  /* studio */
  .studio{display:flex;gap:40px;margin-top:34px;align-items:flex-start}

  /* phone */
  .phone{flex:0 0 auto;width:320px;background:var(--ink);border-radius:42px;padding:11px;
    box-shadow:0 30px 60px -24px rgba(17,17,17,.45)}
  .phone .glass{position:relative;border-radius:32px;overflow:hidden;background:var(--matte);
    aspect-ratio:9/19.5}
  .shot{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;object-position:center top;
    transition:opacity .3s ease}
  .plabel{position:absolute;left:0;right:0;bottom:0;z-index:2;padding:46px 18px 18px;
    background:linear-gradient(to top,rgba(255,255,255,.96),rgba(255,255,255,.7) 55%,rgba(255,255,255,0));}
  .plabel .pn{font-size:15px;font-weight:400;line-height:1.25;letter-spacing:-.01em}
  .plabel .pf{font-size:10px;text-transform:uppercase;letter-spacing:.14em;color:var(--muted);margin-top:5px}
  .notch{position:absolute;top:9px;left:50%;transform:translateX(-50%);z-index:3;
    width:96px;height:7px;border-radius:999px;background:rgba(17,17,17,.18)}
  .fitting{position:absolute;inset:0;z-index:4;display:flex;align-items:center;justify-content:center;
    flex-direction:column;gap:14px;background:rgba(255,255,255,.62);backdrop-filter:blur(2px);
    opacity:0;pointer-events:none;transition:opacity .2s ease}
  .fitting.show{opacity:1}
  .spinner{width:30px;height:30px;border-radius:50%;border:2px solid var(--line);border-top-color:var(--ink);
    animation:spin .8s linear infinite}
  .fitting .ft{font-size:10px;text-transform:uppercase;letter-spacing:.14em;color:var(--muted)}
  @keyframes spin{to{transform:rotate(360deg)}}

  /* panel */
  .panel{flex:1 1 auto;min-width:0;padding-top:4px}
  .kick{font-size:11px;text-transform:uppercase;letter-spacing:.14em;color:var(--muted);
    margin:26px 0 12px;padding-top:16px;border-top:1px solid var(--line)}
  .kick:first-child{margin-top:0;padding-top:0;border-top:none}

  /* closet */
  .closet{display:flex;flex-direction:column;gap:8px}
  .item{display:flex;align-items:center;gap:14px;width:100%;text-align:left;cursor:pointer;
    background:var(--bg);border:1px solid var(--line);border-radius:12px;padding:10px;
    font:inherit;color:inherit;transition:border-color .15s,background .15s}
  .item:hover{background:var(--hover);border-color:var(--faint)}
  .item.on{border-color:var(--ink);box-shadow:inset 0 0 0 1px var(--ink)}
  .item img{width:46px;height:60px;object-fit:cover;object-position:center top;border:1px solid var(--line);flex:0 0 auto}
  .item .nm{font-size:14px;line-height:1.3}
  .item .mt{font-size:12px;color:var(--muted);margin-top:2px}
  .item .chk{margin-left:auto;flex:0 0 auto;font-size:10px;text-transform:uppercase;letter-spacing:.12em;
    color:var(--bg);background:var(--ink);padding:4px 9px;border-radius:999px;opacity:0;transition:opacity .15s}
  .item.on .chk{opacity:1}

  /* segmented front/back */
  .seg{display:inline-flex;border:1px solid var(--ink);border-radius:999px;overflow:hidden}
  .seg button{font:inherit;font-size:11px;text-transform:uppercase;letter-spacing:.12em;
    background:var(--bg);color:var(--ink);border:none;padding:9px 20px;cursor:pointer;transition:background .15s,color .15s}
  .seg button.on{background:var(--ink);color:var(--bg)}

  .fit{font-size:14px;color:var(--muted);line-height:1.5;margin-top:14px;max-width:48ch}
  .fit .size{display:inline-block;font-size:10px;text-transform:uppercase;letter-spacing:.12em;
    color:var(--bg);background:var(--ink);padding:3px 8px;border-radius:999px;margin-right:8px;vertical-align:1px}

  /* composer */
  .composer{display:flex;gap:10px;align-items:center;margin-top:2px}
  .composer input{flex:1;min-width:0;font:inherit;font-size:14px;padding:13px 16px;border-radius:999px;
    border:1px solid var(--line);background:var(--bg);color:var(--ink);outline:none;transition:border-color .15s}
  .composer input:focus{border-color:var(--ink)}
  .composer input::placeholder{color:var(--faint)}
  .try{font:inherit;font-size:11px;text-transform:uppercase;letter-spacing:.12em;
    background:var(--ink);color:var(--bg);border:1px solid var(--ink);padding:14px 22px;border-radius:999px;
    cursor:pointer;flex:0 0 auto;transition:opacity .15s}
  .try:hover{opacity:.85}
  .try:disabled{opacity:.4;cursor:default}
  .cnote{font-size:12px;color:var(--faint);margin-top:11px;line-height:1.5}

  @media (max-width:760px){
    .studio{flex-direction:column;align-items:center;gap:30px}
    .panel{width:100%}
    .fit{max-width:none}
  }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="brand">FitCheck<span class="sub">AI virtual try-on</span></div>
    <span class="badge"><span class="dot"></span>Demo · sample data</span>
  </header>

  <div class="studio">
    <!-- phone preview -->
    <div class="phone">
      <div class="glass">
        <div class="notch"></div>
        <img class="shot" id="shot" src="model-front.jpg" alt="Try-on preview" />
        <div class="plabel">
          <div class="pn" id="pn">Base model</div>
          <div class="pf" id="pf">Front · your AI model</div>
        </div>
        <div class="fitting" id="fitting"><div class="spinner"></div><div class="ft">Fitting to your model…</div></div>
      </div>
    </div>

    <!-- controls -->
    <div class="panel">
      <div class="kick">The closet</div>
      <div class="closet" id="closet"></div>

      <div class="kick">View</div>
      <div class="seg" id="seg">
        <button data-face="front" class="on">Front</button>
        <button data-face="back">Back</button>
      </div>
      <div class="fit" id="fit"></div>

      <div class="kick">Try another</div>
      <div class="composer">
        <input id="url" type="url" placeholder="Paste a product link…" />
        <button class="try" id="tryBtn">Try on</button>
      </div>
      <div class="cnote">Paste any product URL — FitCheck renders the garment onto your model, front and back. (Live generation is disabled in this demo.)</div>
    </div>
  </div>
</div>

<script>
  // Real renders from the app: a base AI model and one real try-on (Basquiat tee), front + back.
  const LOOKS = [
    { id:"model", name:"Base model", meta:"No garment", front:"model-front.jpg", back:"model-back.png",
      size:null, fit:"Your AI-generated model — the canvas every garment gets rendered onto." },
    { id:"basquiat", name:"PEACE FOR ALL Graphic Tee", meta:"Uniqlo × Basquiat", front:"look-basquiat-front.png", back:"look-basquiat-back.png",
      size:"L", fit:"Regular fit — skims the body with a relaxed silhouette and sits just above the hip." },
  ];

  const shot=document.getElementById("shot"), pn=document.getElementById("pn"), pf=document.getElementById("pf"),
        fitEl=document.getElementById("fit"), closetEl=document.getElementById("closet"),
        seg=document.getElementById("seg"), fitting=document.getElementById("fitting"),
        tryBtn=document.getElementById("tryBtn"), url=document.getElementById("url");

  let activeId="model", face="front";
  const look=()=>LOOKS.find(l=>l.id===activeId);

  function render(){
    const l=look(), src=face==="back"?l.back:l.front;
    shot.style.opacity="0.4";
    const im=new Image(); im.onload=()=>{shot.src=src;shot.style.opacity="1";}; im.src=src;
    if(im.complete){shot.src=src;shot.style.opacity="1";}
    pn.textContent=l.name;
    pf.textContent=(face==="front"?"Front":"Back")+" · "+(l.id==="model"?"your AI model":l.meta);
    fitEl.innerHTML=(l.size?'<span class="size">Size '+l.size+'</span>':'')+l.fit;
    [...closetEl.children].forEach(c=>c.classList.toggle("on",c.dataset.id===activeId));
    [...seg.children].forEach(b=>b.classList.toggle("on",b.dataset.face===face));
  }

  LOOKS.forEach(l=>{
    const b=document.createElement("button");
    b.className="item"; b.dataset.id=l.id;
    b.innerHTML='<img src="'+l.front+'" alt=""><div><div class="nm">'+l.name+'</div><div class="mt">'+l.meta+'</div></div><span class="chk">On</span>';
    b.addEventListener("click",()=>{activeId=l.id;face="front";render();});
    closetEl.appendChild(b);
  });
  seg.addEventListener("click",e=>{const b=e.target.closest("button");if(!b)return;face=b.dataset.face;render();});

  let busy=false;
  tryBtn.addEventListener("click",()=>{
    if(busy)return; busy=true;
    tryBtn.textContent="Fitting…"; tryBtn.disabled=true; fitting.classList.add("show");
    setTimeout(()=>{
      fitting.classList.remove("show"); tryBtn.textContent="Try on"; tryBtn.disabled=false; busy=false;
      url.value=""; activeId="basquiat"; face="front"; render();
    },1500);
  });
  url.addEventListener("keydown",e=>{if(e.key==="Enter")tryBtn.click();});

  render();
</script>
</body>
</html>
